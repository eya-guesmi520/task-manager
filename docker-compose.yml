version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - task-network
    environment:
      - MYSQL_HOST=db
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=task_management

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root        # ← Changé de root123 à root
      MYSQL_DATABASE: task_management   # ← Changé de task_management_test
      # MYSQL_USER et MYSQL_PASSWORD sont optionnels, commentés
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - task-network

volumes:
  db_data:

networks:
  task-network: