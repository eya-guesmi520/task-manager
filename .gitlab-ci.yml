stages:
  - build
  - test
  - quality
  - package
  - deploy
  - performance
  - security

cache:
  paths:
    - vendor/
  key: "$CI_JOB_NAME"

variables:
  MYSQL_DATABASE: task_management_test
  MYSQL_ROOT_PASSWORD: root_password

build_job:
  stage: build
  image: php:8.2-cli-alpine
  script:
    - echo "Build started"
    - find . -name "*.php" -type f -exec php -l {} \;
    - echo "Build successful"

test_job:
  stage: test
  image: php:8.2-cli-alpine
  services:
    - mysql:8.0
  before_script:
    - apk add --no-cache mysql-client
    - docker-php-ext-install pdo_mysql mysqli
    - sleep 10
  script:
    - echo "E2E TEST START"
    - |
      php -r '
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
      echo "DB Connected\n";
      '
    - |
      php -r '
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $conn->exec("CREATE TABLE IF NOT EXISTS users (id INT AUTO_INCREMENT PRIMARY KEY, full_name VARCHAR(50) NOT NULL, username VARCHAR(50) NOT NULL, password VARCHAR(255) NOT NULL, role ENUM(\"admin\",\"employee\") NOT NULL)");
      echo "Users table OK\n";
      '
    - |
      php -r '
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $conn->exec("CREATE TABLE IF NOT EXISTS tasks (id INT AUTO_INCREMENT PRIMARY KEY, title VARCHAR(100) NOT NULL, description TEXT, assigned_to INT, due_date DATE, status ENUM(\"pending\",\"in_progress\",\"completed\") DEFAULT \"pending\")");
      echo "Tasks table OK\n";
      '
    - |
      php -r '
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $conn->exec("CREATE TABLE IF NOT EXISTS notifications (id INT AUTO_INCREMENT PRIMARY KEY, message TEXT NOT NULL, recipient INT NOT NULL, type VARCHAR(50) NOT NULL, date DATETIME DEFAULT CURRENT_TIMESTAMP, is_read BOOLEAN DEFAULT FALSE)");
      echo "Notifications table OK\n";
      '
    - |
      php -r '
      $hash = password_hash("123", PASSWORD_DEFAULT);
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $conn->exec("INSERT INTO users (full_name, username, password, role) VALUES (\"Administrator\", \"admin\", \"$hash\", \"admin\")");
      echo "Admin created\n";
      '
    - |
      php -r '
      $hash = password_hash("employee123", PASSWORD_DEFAULT);
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $conn->exec("INSERT INTO users (full_name, username, password, role) VALUES (\"Sarah Johnson\", \"sarah\", \"$hash\", \"employee\")");
      echo "Employee created\n";
      '
    - |
      php -r '
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $stmt = $conn->query("SELECT id FROM users WHERE username=\"sarah\"");
      $sarah_id = $stmt->fetch()["id"];
      $conn->exec("INSERT INTO tasks (title, description, assigned_to, due_date, status) VALUES (\"Complete monthly report\", \"Prepare financial report\", $sarah_id, \"" . date("Y-m-d", strtotime("+7 days")) . "\", \"pending\")");
      echo "Task 1 created\n";
      '
    - |
      php -r '
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $stmt = $conn->query("SELECT id FROM users WHERE username=\"sarah\"");
      $sarah_id = $stmt->fetch()["id"];
      $conn->exec("INSERT INTO tasks (title, description, assigned_to, due_date, status) VALUES (\"Review client feedback\", \"Summarize feedback\", $sarah_id, \"" . date("Y-m-d") . "\", \"pending\")");
      echo "Task 2 created\n";
      '
    - |
      php -r '
      $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password");
      $count = $conn->query("SELECT COUNT(*) FROM users")->fetchColumn();
      echo "Total users: $count\n";
      $count = $conn->query("SELECT COUNT(*) FROM tasks")->fetchColumn();
      echo "Total tasks: $count\n";
      '
    - echo "E2E TESTS COMPLETED"

quality_job:
  stage: quality
  image: php:8.2-cli-alpine
  allow_failure: true
  script:
    - echo "Quality check"
    - grep -r "password_hash" app/ || echo "Missing password_hash"
    - grep -r "prepare" app/ || echo "Missing prepare"
    - echo "Quality check passed"

package_job:
  stage: package
  image: alpine:latest
  before_script:
    - apk add --no-cache zip
  script:
    - echo "Creating package"
    - zip -r employee-task-management.zip *.php app/ inc/ css/ assets/ 2>/dev/null || true
    - echo "Package created"
  artifacts:
    paths:
      - employee-task-management.zip
deploy_staging_job:
  stage: deploy
  image: docker:stable
  services:
    - docker:dind
  before_script:
    - apk add --no-cache docker-cli docker-cli-compose
  script:
    - docker compose down || true
    - docker compose up -d --build
  environment:
    name: staging
    url: http://$PLAYWD-8080.direct.labs.play-with-docker.com

# ---------------- DEPLOY PROD ----------------
deploy_prod_job:
  stage: deploy
  image: docker:stable
  services:
    - docker:dind
  before_script:
    - apk add --no-cache docker-cli docker-cli-compose
  script:
    - docker compose down || true
    - docker compose up -d --build
  environment:
    name: prod
    url: http://$PLAYWD-8080.direct.labs.play-with-docker.com
  when: manual

# ---------------- CANARY ----------------
canary_job:
  stage: deploy
  image: docker:stable
  services:
    - docker:dind
  before_script:
    - apk add --no-cache docker-cli docker-cli-compose
  script:
    - docker compose down || true
    - docker compose up -d --build
  environment:
    name: prod-canary
    url: http://$PLAYWD-8080.direct.labs.play-with-docker.com
  when: manual
  only:
    - main

# ---------------- PERFORMANCE ----------------
performance_job:
  stage: performance
  image: alpine
  services:
    - docker:dind
  variables:
    URL: http://$PLAYWD-8080.direct.labs.play-with-docker.com/
    DOCKER_HOST: tcp://docker:2375
  script:
    - apk add --no-cache curl docker-cli
    - x=1; while [[ "$(curl -s -o /dev/null -w '%{http_code}' $URL)" != "200" && $x -le 60 ]]; do sleep 5; echo "Waiting... $(( x++ ))"; done
    - mkdir sitespeed-results
    - docker run --shm-size=1g --rm -v "$(pwd)":/sitespeed.io sitespeedio/sitespeed.io --outputFolder sitespeed-results $URL
    - mv sitespeed-results/data/performance.json performance.json
  artifacts:
    paths:
      - sitespeed-results/
    reports:
      performance: performance.json

# ---------------- SECURITY ----------------
security_job:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    FULL_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  script:
    - trivy image --clear-cache
    - trivy image --exit-code 0 --cache-dir .trivycache/ --no-progress --format template --template "@/contrib/gitlab.tpl" --output "$CI_PROJECT_DIR/gl-container-scanning-report.json" "$FULL_IMAGE_NAME"
    - trivy image --exit-code 1 --cache-dir .trivycache/ --severity CRITICAL --no-progress "$FULL_IMAGE_NAME"
  cache:
    paths:
      - .trivycache/
  artifacts:
    when: always
    reports:
      container_scanning: gl-container-scanning-report.json      