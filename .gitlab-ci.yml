stages:
  - build
  - test
  - quality
  - package

build_job:
  stage: build
  image: php:8.2-cli-alpine
  script:
    - echo "🔨 Build started"
    - echo "Vérification des fichiers PHP à la racine..."
    - php -l index.php
    - php -l login.php
    - php -l logout.php
    - php -l user.php
    - php -l tasks.php
    - php -l profile.php
    - php -l notifications.php
    - php -l my_task.php
    - php -l create_task.php
    - php -l edit-task.php
    - php -l edit-user.php
    - php -l edit_profile.php
    - php -l delete-task.php
    - php -l delete-user.php
    - echo "Vérification des fichiers dans app/..."
    - php -l app/add-task.php
    - php -l app/add-user.php
    - php -l app/login.php
    - php -l app/update-task.php
    - php -l app/update-user.php
    - php -l app/update-profile.php
    - php -l app/update-task-employee.php
    - php -l app/notification-count.php
    - php -l app/notification-read.php
    - php -l app/notification.php
    - echo "Vérification des modèles..."
    - php -l app/Model/User.php
    - php -l app/Model/Task.php
    - php -l app/Model/Notification.php
    - echo "✅ Build successful"

test_job:
  stage: test
  image: php:8.2-cli-alpine
  script:
    - echo "🧪 Testing functions in User.php..."
    - |
      php -r "
      require_once 'app/Model/User.php';
      echo '=== TEST User.php ===\n\n';
      \$functions = ['get_all_users', 'insert_user', 'update_user', 'delete_user', 'get_user_by_id', 'update_profile', 'count_users'];
      \$ok = true;
      foreach (\$functions as \$f) {
          if (function_exists(\$f)) { echo \"✅ \$f\n\"; } 
          else { echo \"❌ \$f\n\"; \$ok = false; }
      }
      echo \$ok ? \"\n✅ User.php OK\n\" : \"\n❌ User.php FAILED\n\";
      if (!\$ok) exit(1);
      "
    
    - echo ""
    - echo "🧪 Testing functions in Task.php..."
    - |
      php -r "
      require_once 'app/Model/Task.php';
      echo '=== TEST Task.php ===\n\n';
      \$functions = ['insert_task', 'get_all_tasks', 'get_task_by_id', 'update_task', 'delete_task', 'count_tasks', 'get_all_tasks_by_id', 'get_all_tasks_due_today', 'get_all_tasks_overdue'];
      \$ok = true;
      foreach (\$functions as \$f) {
          if (function_exists(\$f)) { echo \"✅ \$f\n\"; } 
          else { echo \"❌ \$f\n\"; \$ok = false; }
      }
      echo \$ok ? \"\n✅ Task.php OK\n\" : \"\n❌ Task.php FAILED\n\";
      if (!\$ok) exit(1);
      "
    
    - echo ""
    - echo "🧪 Testing functions in Notification.php..."
    - |
      php -r "
      require_once 'app/Model/Notification.php';
      echo '=== TEST Notification.php ===\n\n';
      \$functions = ['get_all_my_notifications', 'count_notification', 'insert_notification', 'notification_make_read'];
      \$ok = true;
      foreach (\$functions as \$f) {
          if (function_exists(\$f)) { echo \"✅ \$f\n\"; } 
          else { echo \"❌ \$f\n\"; \$ok = false; }
      }
      echo \$ok ? \"\n✅ Notification.php OK\n\" : \"\n❌ Notification.php FAILED\n\";
      if (!\$ok) exit(1);
      "
    
    - echo ""
    - echo "✅ All function tests passed"

quality_job:
  stage: quality
  image: php:8.2-cli-alpine
  script:
    - echo "🔍 Quality check"
    - echo "Checking for prepared statements..."
    - grep -r "prepare(" app/ DB_connection.php && echo "✅ Prepared statements OK" || echo "⚠️ No prepared statements found"
    - echo "Checking for password hashing..."
    - grep -r "password_hash\|password_verify" app/ && echo "✅ Password hashing OK" || echo "⚠️ No password hashing found"
    - echo "Checking for XSS protection..."
    - grep -r "htmlspecialchars\|stripcslashes" app/ && echo "✅ XSS protection OK" || echo "⚠️ No XSS protection found"
    - echo "✅ Quality check passed"
  allow_failure: true

package_job:
  stage: package
  image: alpine:latest
  before_script:
    - apk add --no-cache zip
  script:
    - echo "📦 Creating package..."
    - zip -r employee-task-management.zip *.php app/ inc/ css/ assets/ img/ 2>/dev/null || true
    - echo "✅ Package created"
    - echo ""
    - echo "📋 Package size:"
    - ls -lh employee-task-management.zip
  artifacts:
    paths:
      - employee-task-management.zip
    expire_in: 7 days