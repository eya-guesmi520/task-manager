stages:
  - build
  - test
  - package

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

build_job:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn compile

test_job:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn test

package_job:
  stage: package
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn package
  artifacts:
    paths:
      - target/*.jar
