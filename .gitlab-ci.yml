stages:
  - build
  - test
  - quality
  - package

build_job:
  stage: build
  image: php:8.2-cli-alpine
  script:
    - echo "🔨 Build started"
    - php -l index.php
    - php -l login.php
    - php -l add-user.php
    - php -l add-task.php
    - find app/ -name "*.php" -exec php -l {} \;
    - echo "✅ Build successful"

test_job:
  stage: test
  image: php:8.2-cli-alpine
  script:
    - echo "🧪 Testing functions in User.php..."
    - |
      php -r "
      require_once 'app/Model/User.php';
      echo '=== TEST DE User.php ===\n\n';
      
      // Tester l'existence des fonctions
      \$functions = ['get_all_users', 'insert_user', 'update_user', 'delete_user', 'get_user_by_id', 'update_profile', 'count_users'];
      \$all_ok = true;
      
      foreach (\$functions as \$func) {
          if (function_exists(\$func)) {
              echo \"✅ Fonction '\$func' existe\n\";
          } else {
              echo \"❌ Fonction '\$func' n'existe PAS\n\";
              \$all_ok = false;
          }
      }
      
      // Tester la fonction count_users (sans connexion DB, vérifier juste sa signature)
      if (function_exists('count_users')) {
          try {
              \$reflection = new ReflectionFunction('count_users');
              \$params = \$reflection->getNumberOfParameters();
              echo \"\n✅ count_users() accepte \$params paramètre(s)\n\";
          } catch (Exception \$e) {
              echo \"⚠️ Erreur reflection: \" . \$e->getMessage() . \"\n\";
          }
      }
      
      echo \$all_ok ? \"\n✅ TOUS LES TESTS User.php RÉUSSIS\n\" : \"\n❌ CERTAINS TESTS User.php ONT ÉCHOUÉ\n\";
      if (!\$all_ok) exit(1);
      "
    
    - echo ""
    - echo "🧪 Testing functions in Task.php..."
    - |
      php -r "
      require_once 'app/Model/Task.php';
      echo '=== TEST DE Task.php ===\n\n';
      
      \$functions = [
          'insert_task', 'get_all_tasks', 'get_all_tasks_due_today', 'count_tasks_due_today',
          'get_all_tasks_overdue', 'count_tasks_overdue', 'get_all_tasks_NoDeadline', 'count_tasks_NoDeadline',
          'delete_task', 'get_task_by_id', 'count_tasks', 'update_task', 'update_task_status',
          'get_all_tasks_by_id', 'count_pending_tasks', 'count_in_progress_tasks', 'count_completed_tasks',
          'count_my_tasks', 'count_my_tasks_overdue', 'count_my_tasks_NoDeadline',
          'count_my_pending_tasks', 'count_my_in_progress_tasks', 'count_my_completed_tasks'
      ];
      \$all_ok = true;
      
      foreach (\$functions as \$func) {
          if (function_exists(\$func)) {
              echo \"✅ Fonction '\$func' existe\n\";
          } else {
              echo \"❌ Fonction '\$func' n'existe PAS\n\";
              \$all_ok = false;
          }
      }
      
      // Tester la fonction get_task_by_id signature
      if (function_exists('get_task_by_id')) {
          \$reflection = new ReflectionFunction('get_task_by_id');
          \$params = \$reflection->getNumberOfParameters();
          echo \"\n✅ get_task_by_id() accepte \$params paramètre(s) (devrait être 2: conn, id)\n\";
      }
      
      // Tester la fonction count_tasks
      if (function_exists('count_tasks')) {
          \$reflection = new ReflectionFunction('count_tasks');
          \$params = \$reflection->getNumberOfParameters();
          echo \"✅ count_tasks() accepte \$params paramètre(s) (devrait être 1: conn)\n\";
      }
      
      echo \$all_ok ? \"\n✅ TOUS LES TESTS Task.php RÉUSSIS\n\" : \"\n❌ CERTAINS TESTS Task.php ONT ÉCHOUÉ\n\";
      if (!\$all_ok) exit(1);
      "
    
    - echo ""
    - echo "🧪 Testing functions in Notification.php..."
    - |
      php -r "
      require_once 'app/Model/Notification.php';
      echo '=== TEST DE Notification.php ===\n\n';
      
      \$functions = ['get_all_my_notifications', 'count_notification', 'insert_notification', 'notification_make_read'];
      \$all_ok = true;
      
      foreach (\$functions as \$func) {
          if (function_exists(\$func)) {
              echo \"✅ Fonction '\$func' existe\n\";
          } else {
              echo \"❌ Fonction '\$func' n'existe PAS\n\";
              \$all_ok = false;
          }
      }
      
      // Vérifier le nombre de paramètres de count_notification
      if (function_exists('count_notification')) {
          \$reflection = new ReflectionFunction('count_notification');
          \$params = \$reflection->getNumberOfParameters();
          echo \"\n✅ count_notification() accepte \$params paramètre(s) (devrait être 2: conn, id)\n\";
      }
      
      echo \$all_ok ? \"\n✅ TOUS LES TESTS Notification.php RÉUSSIS\n\" : \"\n❌ CERTAINS TESTS Notification.php ONT ÉCHOUÉ\n\";
      if (!\$all_ok) exit(1);
      "
    
    - echo ""
    - echo "✅ All function tests passed"

quality_job:
  stage: quality
  image: php:8.2-cli-alpine
  script:
    - echo "🔍 Quality check"
    - echo "Checking for security issues..."
    - grep -r "SELECT.*\$_" app/ || echo "No SQL injection patterns found"
    - grep -r "password_hash" app/ && echo "Password hashing OK"
    - echo "Checking for prepared statements..."
    - grep -r "prepare(" app/ && echo "Prepared statements OK"
    - echo "✅ Quality check passed"
  allow_failure: true

package_job:
  stage: package
  image: alpine:latest
  before_script:
    - apk add --no-cache zip
  script:
    - echo "📦 Creating package..."
    - zip -r employee-task-management.zip *.php app/ inc/ css/ assets/ || true
    - echo "✅ Package created"
    - echo ""
    - echo "📋 Package contents:"
    - unzip -l employee-task-management.zip | head -20
  artifacts:
    paths:
      - employee-task-management.zip
    expire_in: 7 days