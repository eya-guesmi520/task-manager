stages:
  - build
  - test
  - quality
  - package

variables:
  MYSQL_DATABASE: employee_db
  MYSQL_ROOT_PASSWORD: root
  COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer"

cache:
  paths:
    - .composer/

build_job:
  stage: build
  image: php:8.2-cli
  before_script:
    - apt-get update && apt-get install -y unzip git libzip-dev
    - docker-php-ext-install mysqli pdo pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - composer install --no-interaction --prefer-dist --optimize-autoloader

test_job:
  stage: test
  image: php:8.2-cli
  services:
    - mysql:8.0
  before_script:
    - docker-php-ext-install mysqli pdo pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction
    - php -r "mysqli_connect('mysql', 'root', 'root', 'employee_db');"
  script:
    - ./vendor/bin/phpunit --colors=always

code_quality_job:
  stage: quality
  image: php:8.2-cli
  allow_failure: true
  before_script:
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction
  script:
    - ./vendor/bin/phpcs --standard=PSR12 app/ inc/ *.php
    - ./vendor/bin/phpmd app/,inc/,*.php text cleancode,codesize,controversial,design,naming,unusedcode

package_job:
  stage: package
  image: docker:stable
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
