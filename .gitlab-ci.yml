stages:
  - build
  - test

# Job pour vérifier que PHP est installé et que le code compile
build_job:
  stage: build
  image: php:8.2
  script:
    - php -v
    - echo "Build OK - PHP code ready"

# Job pour lancer les tests unitaires (si tu utilises PHPUnit)
test_job:
  stage: test
  image: php:8.2
  before_script:
    - apt-get update && apt-get install -y unzip libzip-dev
    - docker-php-ext-install mysqli pdo pdo_mysql
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install
  script:
    - ./vendor/bin/phpunit --testdox
