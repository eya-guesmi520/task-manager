stages:
  - build
  - test

# Vérification basique du code PHP
build_job:
  stage: build
  image: php:8.2
  script:
    - php -v
    - echo "Build OK - PHP syntax check"
    - php -l delete-task.php   # exemple: vérifie syntaxe d'un fichier

# Tests unitaires (si tu ajoutes PHPUnit plus tard)
test_job:
  stage: test
  image: php:8.2
  before_script:
    - apt-get update && apt-get install -y unzip libzip-dev
    - docker-php-ext-install mysqli pdo pdo_mysql
  script:
    - echo "No composer.json, skipping composer install"
    - echo "Add PHPUnit here if needed"
