stages:
  - build
  - test
  - quality

# Build: installer Composer et les dépendances
build_job:
  stage: build
  image: php:8.2
  script:
    - apt-get update && apt-get install -y unzip git
    - php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
    - php composer-setup.php --install-dir=/usr/local/bin --filename=composer
    - if [ -f composer.json ]; then composer install; else echo "No composer.json, skipping composer install"; fi

# Test: vérifier la syntaxe PHP ou lancer PHPUnit si dispo
test_job:
  stage: test
  image: php:8.2
  script:
    - if [ -f vendor/bin/phpunit ]; then ./vendor/bin/phpunit --testdox; else php -l index.php; fi

# Quality: vérifier le style du code
code_quality_job:
  stage: quality
  allow_failure: true
  image: php:8.2
  script:
    - apt-get update && apt-get install -y php-codesniffer
    - phpcs --standard=PSR12 src/ || true
  artifacts:
    paths:
      - phpcs.xml
