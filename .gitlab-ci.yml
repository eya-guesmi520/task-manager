stages:
  - build
  - test
  - quality
  - package

cache:
  paths:
    - vendor/
  key: "$CI_JOB_NAME"

variables:
  MYSQL_DATABASE: task_management_test
  MYSQL_ROOT_PASSWORD: root_password

build_job:
  stage: build
  image: php:8.2-cli-alpine
  script:
    - echo "Build started"
    - find . -name "*.php" -type f -exec php -l {} \;
    - echo "Build successful"

test_job:
  stage: test
  image: php:8.2-cli-alpine
  services:
    - mysql:8.0
  before_script:
    - apk add --no-cache mysql-client
    - docker-php-ext-install pdo_mysql mysqli
    - sleep 5
  script:
    - echo "E2E TEST START"
    - php -r '$conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION); echo "DB Connected";'
    - php -r '$conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $conn->exec("CREATE TABLE IF NOT EXISTS users (id INT AUTO_INCREMENT PRIMARY KEY, full_name VARCHAR(50) NOT NULL, username VARCHAR(50) NOT NULL, password VARCHAR(255) NOT NULL, role ENUM("admin","employee") NOT NULL)"); echo "Users table OK";'
    - php -r '$conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $conn->exec("CREATE TABLE IF NOT EXISTS tasks (id INT AUTO_INCREMENT PRIMARY KEY, title VARCHAR(100) NOT NULL, description TEXT, assigned_to INT, due_date DATE, status ENUM("pending","in_progress","completed") DEFAULT "pending")"); echo "Tasks table OK";'
    - php -r '$conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $conn->exec("CREATE TABLE IF NOT EXISTS notifications (id INT AUTO_INCREMENT PRIMARY KEY, message TEXT NOT NULL, recipient INT NOT NULL, type VARCHAR(50) NOT NULL, date DATE DEFAULT CURRENT_TIMESTAMP, is_read BOOLEAN DEFAULT FALSE)"); echo "Notifications table OK";'
    - php -r '$conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $conn->exec("INSERT INTO users (full_name, username, password, role) VALUES ("Administrator", "admin", "admin_hash", "admin")"); echo "Admin created";'
    - php -r 'require_once "app/Model/User.php"; $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); insert_user($conn, ["Sarah Johnson", "sarah", "employee_hash", "employee"]); echo "Employee created";'
    - php -r 'require_once "app/Model/Task.php"; $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $stmt = $conn->query("SELECT id FROM users WHERE username="sarah""); $sarah_id = $stmt->fetch()["id"]; insert_task($conn, ["Task 1", "Description", $sarah_id, "2025-12-31"]); echo "Task 1 created";'
    - php -r 'require_once "app/Model/Task.php"; $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $stmt = $conn->query("SELECT id FROM users WHERE username="sarah""); $sarah_id = $stmt->fetch()["id"]; insert_task($conn, ["Task 2", "Description 2", $sarah_id, "2025-12-31"]); echo "Task 2 created";'
    - php -r 'require_once "app/Model/Task.php"; $conn = new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); $stmt = $conn->query("SELECT id FROM tasks LIMIT 1"); if($task = $stmt->fetch()) { update_task_status($conn, ["completed", $task["id"]]); echo "Task updated"; }'
    - echo "E2E TESTS COMPLETED"

quality_job:
  stage: quality
  image: php:8.2-cli-alpine
  allow_failure: true
  script:
    - echo "Quality check"
    - grep -r "password_hash" app/ || echo "Missing password_hash"
    - grep -r "prepare" app/ || echo "Missing prepare"
    - echo "Quality check passed"

package_job:
  stage: package
  image: alpine:latest
  before_script:
    - apk add --no-cache zip
  script:
    - echo "Creating package"
    - zip -r employee-task-management.zip *.php app/ inc/ css/ assets/ 2>/dev/null || true
    - echo "Package created"
  artifacts:
    paths:
      - employee-task-management.zip