stages:
  - build
  - test
  - quality
  - package
  - deploy

variables:
  MYSQL_DATABASE: task_management
  MYSQL_ROOT_PASSWORD: root
  DOCKER_HOST: unix:///var/run/docker.sock

cache:
  paths:
    - vendor/
  key: "$CI_JOB_NAME"

build_job:
  stage: build
  tags:
    - taskes-managers
  script:
    - echo "Build started"
    - docker run --rm -v $(pwd):/app php:8.2-cli-alpine sh -c "cd /app && find . -name '*.php' -type f -exec php -l {} \;"
    - echo "Build successful"

test_job:
  stage: test
  tags:
    - taskes-managers
  script:
    - echo "E2E TEST START"
    - docker run -d --name mysql-test -e MYSQL_ROOT_PASSWORD=root -e MYSQL_DATABASE=task_management mysql:8.0
    - sleep 15
    - |
      cat > /tmp/test_db.php << 'PHPCODE'
      <?php
      try {
          $conn = new PDO("mysql:host=mysql-test;dbname=task_management", "root", "root");
          $conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
          echo "DB Connected\n";
          $conn->exec("CREATE TABLE IF NOT EXISTS users (
              id INT AUTO_INCREMENT PRIMARY KEY,
              full_name VARCHAR(50) NOT NULL,
              username VARCHAR(50) NOT NULL,
              password VARCHAR(255) NOT NULL,
              role ENUM('admin','employee') NOT NULL
          )");
          echo "Users table OK\n";
          $conn->exec("CREATE TABLE IF NOT EXISTS tasks (
              id INT AUTO_INCREMENT PRIMARY KEY,
              title VARCHAR(100) NOT NULL,
              description TEXT,
              assigned_to INT,
              due_date DATE NULL DEFAULT NULL,
              status ENUM('pending','in_progress','completed') DEFAULT 'pending'
          )");
          echo "Tasks table OK\n";
          $conn->exec("CREATE TABLE IF NOT EXISTS notifications (
              id INT AUTO_INCREMENT PRIMARY KEY,
              message TEXT NOT NULL,
              recipient INT NOT NULL,
              type VARCHAR(50) NOT NULL,
              date DATETIME DEFAULT CURRENT_TIMESTAMP,
              is_read BOOLEAN DEFAULT FALSE
          )");
          echo "Notifications table OK\n";
          $hash = password_hash("123", PASSWORD_DEFAULT);
          $conn->exec("INSERT INTO users (full_name, username, password, role) VALUES ('Administrator', 'admin', '$hash', 'admin') ON DUPLICATE KEY UPDATE id=id");
          echo "Users created successfully\n";
          echo "E2E TESTS COMPLETED\n";
      } catch (PDOException $e) {
          echo "Error: " . $e->getMessage() . "\n";
          exit(1);
      }
      PHPCODE
    - docker run --rm --link mysql-test:mysql -v $(pwd):/app -v /tmp:/tmp php:8.2-cli-alpine sh -c "docker-php-ext-install pdo_mysql && php /tmp/test_db.php"
    - echo "✅ E2E TESTS COMPLETED"
  after_script:
    - docker stop mysql-test 2>/dev/null || true
    - docker rm mysql-test 2>/dev/null || true
    - rm -f /tmp/test_db.php 2>/dev/null || true

quality_job:
  stage: quality
  tags:
    - taskes-managers
  allow_failure: true
  script:
    - echo "Quality check"
    - docker run --rm -v $(pwd):/app php:8.2-cli-alpine sh -c "cd /app && grep -r 'password_hash' app/ 2>/dev/null || echo 'Missing password_hash'"
    - docker run --rm -v $(pwd):/app php:8.2-cli-alpine sh -c "cd /app && grep -r 'prepare' app/ 2>/dev/null || echo 'Missing prepare'"
    - echo "Quality check passed"

package_job:
  stage: package
  tags:
    - taskes-managers
  script:
    - echo "Creating package"
    - docker run --rm -v $(pwd):/app alpine:latest sh -c "apk add --no-cache zip && cd /app && zip -r employee-task-management.zip *.php app/ inc/ css/ assets/ 2>/dev/null || true"
    - echo "Package created"
  artifacts:
    paths:
      - employee-task-management.zip

deploy_staging_job:
  stage: deploy
  tags:
    - taskes-managers
  script:
    - echo "🚀 Déploiement rapide..."
    - docker compose down --remove-orphans || true
    - sudo fuser -k 8080/tcp 2>/dev/null || true
    - docker compose up -d
    - sleep 5
    - echo "✅ Déployé !"
    - echo "🌐 http://localhost:8080"
    - docker ps --format "table {{.Names}}\t{{.Ports}}"
  environment:
    name: staging
    url: http://localhost:8080
  only:
    - main