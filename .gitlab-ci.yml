stages:
  - build
  - test
  - package

build_job:
  stage: build
  image: php:8.2-cli-alpine
  script:
    - echo "Build started"
    - find . -name "*.php" -type f -exec php -l {} \;
    - echo "Build successful"

test_job:
  stage: test
  image: php:8.2-cli-alpine
  services:
    - mysql:8.0
  variables:
    MYSQL_DATABASE: task_management_test
    MYSQL_ROOT_PASSWORD: root_password
  before_script:
    - apk add --no-cache mysql-client
    - docker-php-ext-install pdo_mysql mysqli
    - sleep 15
  script:
    - echo "Test 1: Database connection"
    - php -r 'try { new PDO("mysql:host=mysql;dbname=task_management_test", "root", "root_password"); echo "DB Connected\n"; } catch(Exception $e) { echo "Error\n"; }'
    - echo "Test 2: Load models"
    - php -r 'require_once "app/Model/User.php"; echo "User OK\n";'
    - php -r 'require_once "app/Model/Task.php"; echo "Task OK\n";'
    - php -r 'require_once "app/Model/Notification.php"; echo "Notification OK\n";'
    - echo "All tests passed"

package_job:
  stage: package
  image: alpine:latest
  before_script:
    - apk add --no-cache zip
  script:
    - zip -r employee-task-management.zip *.php app/ inc/ css/ assets/ 2>/dev/null || true
  artifacts:
    paths:
      - employee-task-management.zip