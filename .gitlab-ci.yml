stages:
  - build
  - test
  - quality

build_job:
  stage: build
  image: php:8.2
  script:
    - apt-get update && apt-get install -y unzip git
    - docker-php-ext-install zip
    - php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
    - php composer-setup.php --install-dir=/usr/local/bin --filename=composer
    - if [ -f composer.json ]; then composer install; else echo "No composer.json, skipping composer install"; fi

test_job:
  stage: test
  image: php:8.2
  script:
    - if [ -f vendor/bin/phpunit ]; then ./vendor/bin/phpunit --testdox; else php -l index.php; fi
  variables:
    MYSQL_HOST: mysql
    MYSQL_USER: root
    MYSQL_PASSWORD: root
    MYSQL_DATABASE: employee_db
  before_script:
    - docker-php-ext-install mysqli pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction
    - php -r "new mysqli(getenv('MYSQL_HOST'), getenv('MYSQL_USER'), getenv('MYSQL_PASSWORD'), getenv('MYSQL_DATABASE'));"
  script:
    - ./vendor/bin/phpunit --colors=always

code_quality_job:
  stage: quality
  image: php:8.2-cli
  allow_failure: true
  before_script:
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction
  script:
    - ./vendor/bin/phpcs --standard=PSR12 app/ inc/ *.php
    - ./vendor/bin/phpmd app/,inc/,*.php text cleancode,codesize,controversial,design,naming,unusedcode

package_job:
  stage: package
  image: docker:stable
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
