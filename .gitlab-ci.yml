stages:
  - build
  - test

# Utilise une image qui contient déjà Maven + JDK 17
default:
  image: maven:3.9.6-eclipse-temurin-17
  before_script:
    - echo "Using Maven + JDK 17 image"
    - mvn -v
    - java -version

# Job de compilation
build_job:
  stage: build
  script:
    - mvn compile -Dhttps.protocols=TLSv1.2 \
        -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository \
        -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn \
        -Dorg.slf4j.simpleLogger.showDateTime=true \
        --batch-mode --errors --fail-at-end --show-version
  artifacts:
    paths:
      - target/

# Job de test
test_job:
  stage: test
  script:
    - mvn test --batch-mode
  dependencies:
    - build_job

    # Mise à jour du pipeline

